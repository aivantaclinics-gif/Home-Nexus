# Codemagic Configuration File for Capacitor Android APK Build

version: 1.0

scripts:
  - name: Build Android APK
    scripts:
      - git clone https://github.com/aivantaclinics-gif/Home-Nexus.git
      - cd Home-Nexus
      - npm install
      - npm run build
      - npx cap add android
      - npx cap sync android
      - cd android
      - ./gradlew assembleDebug
      - cp app/build/outputs/apk/debug/app-debug.apk $HOME/builds/

artifacts:
  - $HOME/builds/*.apk
